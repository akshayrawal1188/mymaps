<script>
  // ── KML COLOR CONVERTER ──
  function kmlColorToHex(kmlColor) {
    if (!kmlColor || kmlColor.length < 8) return null;

    const r = kmlColor.slice(6, 8);
    const g = kmlColor.slice(4, 6);
    const b = kmlColor.slice(2, 4);
    const a = parseInt(kmlColor.slice(0, 2), 16) / 255;

    return {
      hex: `#${r}${g}${b}`,
      alpha: a
    };
  }

  // ── PARSE STYLES FROM KML ──
  function parseKmlStyles(xmlDoc) {
    const styles = {};
    const styleMaps = {};

    xmlDoc.querySelectorAll('Style').forEach(styleEl => {
      const id = styleEl.getAttribute('id');
      if (!id) return;

      const lineColorEl = styleEl.querySelector('LineStyle > color');
      const polyColorEl = styleEl.querySelector('PolyStyle > color');

      styles[id] = {
        lineColor: lineColorEl
          ? kmlColorToHex(lineColorEl.textContent.trim())
          : null,

        polyColor: polyColorEl
          ? kmlColorToHex(polyColorEl.textContent.trim())
          : null
      };
    });

    xmlDoc.querySelectorAll('StyleMap').forEach(sm => {
      const id = sm.getAttribute('id');

      const normalPair = Array.from(sm.querySelectorAll('Pair'))
        .find(p => p.querySelector('key')?.textContent === 'normal');

      const url = normalPair
        ?.querySelector('styleUrl')
        ?.textContent
        ?.replace('#', '');

      if (id && url) {
        styleMaps[id] = url;
      }
    });

    return { styles, styleMaps };
  }

  // ── MAP INIT ──
  const map = L.map('map', {
    center: [21.618, 73.025],
    zoom: 13,
    preferCanvas: true
  });

  // ── TILE LAYERS ──
  const tiles = {
    dark: L.tileLayer(
      'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
      {
        attribution: '© OpenStreetMap © CARTO',
        maxZoom: 19
      }
    ),

    satellite: L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      {
        attribution: '© Esri',
        maxZoom: 19
      }
    ),

    streets: L.tileLayer(
      'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      {
        attribution: '© OpenStreetMap',
        maxZoom: 19
      }
    )
  };

  tiles.dark.addTo(map);

  let currentTile = 'dark';

  function setTile(name) {
    map.removeLayer(tiles[currentTile]);
    tiles[name].addTo(map);
    currentTile = name;
  }

  // ── COORDS ──
  map.on('mousemove', e => {
    document.getElementById('coords').textContent =
      `LAT: ${e.latlng.lat.toFixed(5)}   LNG: ${e.latlng.lng.toFixed(5)}`;
  });

  // ── LIVE KML URL ──
  const kmlUrl =
    'https://akshayrawal1188.github.io/mymaps/AIAMAP.kml';

  let kmlLayer = null;
  let markerCount = 0;
  let polygonCount = 0;
  let zoneNames = new Set();

  // ── LOAD KML ──
  fetch(kmlUrl)
    .then(response => response.text())

    .then(kmlText => {

      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(
        kmlText,
        'text/xml'
      );

      const { styles, styleMaps } = parseKmlStyles(xmlDoc);

      function resolveStyle(styleUrl) {
        const id = styleUrl?.replace('#', '');

        if (!id) return {};

        if (styles[id]) return styles[id];

        if (styleMaps[id] && styles[styleMaps[id]]) {
          return styles[styleMaps[id]];
        }

        return {};
      }

      const geojson = toGeoJSON.kml(xmlDoc);

      kmlLayer = L.geoJson(geojson, {

        style: function(feature) {

          const props = feature.properties || {};

          const styleId =
            (props.styleUrl || '').replace('#', '');

          const s = resolveStyle(styleId);

          return {
            color: s.lineColor?.hex || '#00c2ff',
            weight: 2,
            opacity: s.lineColor?.alpha || 1,

            fillColor:
              s.polyColor?.hex ||
              s.lineColor?.hex ||
              '#00c2ff',

            fillOpacity:
              s.polyColor?.alpha || 0.25
          };
        },

        pointToLayer: function(feature, latlng) {

          return L.circleMarker(latlng, {
            radius: 5,
            fillColor: '#00c2ff',
            color: '#ffffff',
            weight: 1,
            fillOpacity: 1
          });
        },

        onEachFeature: function(feature, layer) {

          const name =
            feature.properties?.name || '';

          const desc =
            feature.properties?.description || '';

          const geomType =
            feature.geometry?.type || '';

          if (name) zoneNames.add(name);

          if (geomType === 'Point') {
            markerCount++;
          }

          if (geomType.includes('Polygon')) {
            polygonCount++;
          }

          if (name) {

            layer.bindTooltip(name, {
              direction: 'top',
              className: 'kml-label'
            });

            layer.bindPopup(`
              <div style="font-family:monospace;">
                <strong>${name}</strong><br><br>
                ${desc || ''}
              </div>
            `);
          }
        }
      });

      kmlLayer.addTo(map);

      // ── STATS ──
      document
        .getElementById('loading')
        .classList.add('hidden');

      document
        .getElementById('stat-zones')
        .textContent = zoneNames.size;

      document
        .getElementById('stat-markers')
        .textContent = markerCount;

      document
        .getElementById('stat-polygons')
        .textContent = polygonCount;

      // ── FIT BOUNDS ──
      const bounds = kmlLayer.getBounds();

      if (bounds.isValid()) {
        map.fitBounds(bounds, {
          padding: [20, 20]
        });
      }

      // ── SIDEBAR ──
      const list =
        document.getElementById('zone-list');

      list.innerHTML = '';

      zoneNames.forEach(name => {

        list.innerHTML += `
          <div class="zone-item">
            <div class="zone-color"
              style="background:#00c2ff">
            </div>

            <div class="zone-name">
              ${name}
            </div>
          </div>
        `;
      });
    })

    .catch(err => {

      console.error(err);

      document
        .getElementById('loading')
        .classList.add('hidden');

      document
        .getElementById('error-banner')
        .classList.add('show');
    });

  // ── FIT BUTTON ──
  function fitBounds() {

    if (kmlLayer) {

      const bounds = kmlLayer.getBounds();

      if (bounds.isValid()) {
        map.fitBounds(bounds, {
          padding: [20, 20]
        });
      }
    }
  }

  // ── SEARCH ──
  document
    .getElementById('search-input')
    .addEventListener('input', function() {

      const q = this.value.toLowerCase();

      document
        .querySelectorAll('#zone-list .zone-item')
        .forEach(el => {

          el.style.display =
            el.textContent
              .toLowerCase()
              .includes(q)
              ? ''
              : 'none';
        });
    });
</script>
